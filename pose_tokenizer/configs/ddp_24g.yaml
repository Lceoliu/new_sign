# Pose Tokenizer low-memory config for 24GB GPUs (DDP-friendly)

# Model Architecture
num_keypoints: 133
keypoint_dim: 3
sequence_length: 64
hidden_dim: 128
num_layers: 3

# ST-GCN Encoder
stgcn_channels: [64, 128, 256]
stgcn_temporal_kernels: [9, 5, 3]
stgcn_dropout: 0.1

# RVQ Tokenizer
num_quantizers: 2
codebook_size: 512
commitment_cost: 0.25
decay: 0.99
epsilon: 1e-5
dead_code_threshold: 1e-5

# Decoder
decoder_channels: [128, 64, 32]
decoder_dropout: 0.1

# Training Parameters (per GPU)
batch_size: 4
num_epochs: 100
learning_rate: 1e-4
weight_decay: 1e-5
gradient_clip_norm: 1.0

# Loss Weights
reconstruction_weight: 1.0
quantization_weight: 1.0
perceptual_weight: 0.0
temporal_weight: 0.1
adversarial_weight: 0.0
w_pos: 1.0
w_vel: 0.5
w_acc: 0.25
w_bone: 0.5
w_vq: 1.0

# Optimizer
optimizer_type: "adamw"
beta1: 0.9
beta2: 0.999
momentum: 0.9

# Scheduler
scheduler_type: "cosine"
warmup_epochs: 5
min_lr: 1e-6
step_size: 30
gamma: 0.1

# Data
data_dir: "data/CSL-News/pose_format"
normalize_poses: true
augment_data: true
num_workers: 4
clip_mode: "random_window"
window_T: 64
normalize_by_wh: true
load_log_every: 500

# Training Settings
use_amp: true
distributed: true
val_interval: 1
log_interval: 100
save_interval: 10

# Paths
checkpoint_dir: "checkpoints"
log_dir: "logs"
output_dir: "outputs"
skeleton_def: "configs/skeleton_definition.json"

# Evaluation
eval_batch_size: 8
eval_num_samples: 1000

# Export Settings
export_format: "onnx"
export_dynamic_axes: true
export_opset_version: 11
